<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>길드 현황 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1 class="page-title">길드 현황 관리</h1>
        <p class="page-desc">길드 현황을 조회하고 관리합니다.</p>
      </div>
    </header>

    <section class="tabs-wrap">
      <div class="tabs">
        <button class="tab" type="button" data-tab="power">전투력</button>
        <button class="tab active" type="button" data-tab="mount">탈것</button>
        <button class="tab" type="button" data-tab="accessory">악세사리</button>
        <button class="tab" type="button" data-tab="boss">보스컬렉</button>
        <button class="tab" type="button" data-tab="special">특수</button>
      </div>
    </section>

    <section class="card">
      <div class="card-header table-header">
        <div>
          <h2 class="card-title">전체 현황</h2>
          <p class="card-subtitle" id="tableGuideText">검색 결과가 정확히 1명일 때만 수정할 수 있습니다.</p>
        </div>

        <div class="table-search">
          <input type="text" id="searchInput" placeholder="길드원 검색">
          <button class="btn btn-dark btn-icon" id="searchBtn" type="button" aria-label="검색" title="검색">🔍</button>
          <button class="btn btn-gray" id="resetBtn" type="button">새로고침</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="summary-table">
          <thead id="summaryTableHead"></thead>
          <tbody id="summaryTableBody"></tbody>
        </table>
      </div>
    </section>

    <div class="actions-below-table">
      <div class="below-table-left-actions">
        <button class="btn btn-outline" id="bulkEditBtn" type="button">전체수정</button>
        <button class="btn btn-primary hidden" id="bulkSaveBtn" type="button">저장</button>
        <button class="btn btn-gray hidden" id="bulkCancelBtn" type="button">취소</button>
      </div>
      <div class="top-actions actions-below-table-right">
        <button class="btn btn-gray hidden" id="importInitBtn" type="button">초기값 붙여넣기</button>
        <button class="btn btn-outline" id="guildManageBtn" type="button">길드원 관리</button>
        <button class="btn btn-primary" id="itemManageBtn" type="button">탈것 관리</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="passwordModalBackdrop">
    <div class="modal">
      <h3>비밀번호 입력</h3>
      <div class="form-row">
        <label for="passwordInput">비밀번호</label>
        <input type="password" id="passwordInput" placeholder="비밀번호를 입력해주세요">
      </div>
      <p class="error-text hidden" id="passwordErrorText">비밀번호가 올바르지 않습니다.</p>
      <div class="modal-buttons">
        <button class="btn btn-gray" id="passwordCancelBtn" type="button">취소</button>
        <button class="btn btn-primary" id="passwordConfirmBtn" type="button">확인</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="guildManageModalBackdrop">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>길드원 관리</h3>
        <button class="icon-btn" id="guildManageCloseBtn" type="button">×</button>
      </div>

      <div class="modal-toolbar">
        <button class="btn btn-primary" id="addMemberBtn" type="button">길드원 추가</button>
      </div>

      <div class="table-wrap modal-table-wrap">
        <table class="manage-table">
          <thead>
            <tr>
              <th>no</th>
              <th>길드원</th>
              <th>전투력</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="guildManageTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="itemManageModalBackdrop">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 id="itemManageTitle">탈것 관리</h3>
        <button class="icon-btn" id="itemManageCloseBtn" type="button">×</button>
      </div>

      <div class="modal-toolbar">
        <button class="btn btn-primary" id="addItemBtn" type="button">탈것 추가</button>
      </div>

      <div class="table-wrap modal-table-wrap">
        <table class="manage-table">
          <thead>
            <tr>
              <th>no</th>
              <th id="itemNameHeader">탈것명</th>
              <th id="itemMaxHeader" class="hidden">최대값</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="itemManageTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>


  <div class="modal-backdrop hidden" id="searchSelectModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <h3>길드원 선택</h3>
        <button class="icon-btn" id="searchSelectCloseBtn" type="button">×</button>
      </div>
      <p class="card-subtitle" id="searchSelectGuideText">검색 결과에서 길드원을 선택해주세요.</p>
      <div class="search-select-list" id="searchSelectList"></div>
      <div class="modal-buttons">
        <button class="btn btn-gray" id="searchSelectCancelBtn" type="button">취소</button>
      </div>
    </div>
  </div>


  <div class="modal-backdrop hidden" id="importModalBackdrop">
    <div class="modal modal-lg import-modal">
      <div class="modal-header">
        <h3 id="importModalTitle">초기값 붙여넣기</h3>
        <button class="icon-btn" id="importCloseBtn" type="button">×</button>
      </div>
      <p class="card-subtitle">첫 줄에는 항목 헤더를 포함해서 붙여넣어주세요. 첫 칸은 길드원 이름입니다. 빈칸은 기존값을 유지합니다.</p>
      <div class="form-row">
        <label for="importTextarea">엑셀 값 붙여넣기</label>
        <textarea id="importTextarea" class="import-textarea" placeholder="이름&#9;천마&#9;백호
홍길동&#9;1&#9;0
김철수&#9;&#9;1"></textarea>
      </div>
      <div class="import-preview" id="importPreviewBox">미리보기 버튼을 누르면 반영 예정 내용을 확인할 수 있습니다.</div>
      <div class="modal-buttons">
        <button class="btn btn-gray" id="importCancelBtn" type="button">취소</button>
        <button class="btn btn-outline" id="importPreviewBtn" type="button">미리보기</button>
        <button class="btn btn-primary" id="importApplyBtn" type="button" disabled>적용</button>
      </div>
    </div>
  </div>

  <div class="bulk-save-overlay hidden" id="bulkSaveOverlay">
    <div class="bulk-save-overlay-card">
      <p class="bulk-save-title">저장 중입니다...</p>
      <div class="bulk-save-progress">
        <div class="bulk-save-progress-fill" id="bulkSaveBarFill"></div>
      </div>
      <p class="bulk-save-percent" id="bulkSavePercent">0%</p>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
